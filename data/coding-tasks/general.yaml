role: General
tasks:
  - id: ct-gen-1
    title: Find the Maximum in an Array
    description: >-
      What it is: A small array-scanning exercise (classic warm-up).


      Goal: Return the largest number in an array by looping and comparing—no Math.max, no sort.


      What to do: Implement findMax(numbers). Decide and document behavior for an empty array
      (return undefined, throw, or null). Handle negatives and ties.


      Finish when: You can walk through examples (e.g. [3,1,4], [-2,-9], single element) and the
      logic is clear in the shared editor.
    starterCode: |-
      function findMax(numbers) {
        // Loop through the array and find the maximum value
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-2
    title: Reverse an Array In-Place
    description: >-
      What it is: Mutate the given array so its elements appear in reverse order without allocating
      a second array.


      Goal: Practice indices and swapping from both ends toward the middle.


      What to do: Implement reverseArray(arr). Use a loop and swap arr[i] with arr[j]. Do not use
      reverse() or a copy-then-assign pattern.


      Finish when: Odd/even lengths both work; you can explain O(n) time and O(1) extra space.
    starterCode: |-
      function reverseArray(arr) {
        // Reverse the array in-place using a loop
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-3
    title: Remove Duplicates from an Array
    description: >-
      What it is: Produce a new array with first occurrence of each value only, in original order.


      Goal: Duplicate removal without Set (use a plain loop / object map if you like).


      What to do: Implement removeDuplicates(arr). Preserve order: [1,2,1,3] → [1,2,3].


      Finish when: Works for strings and numbers; mention complexity; edge cases: empty array, all
      duplicates.
    starterCode: |-
      function removeDuplicates(arr) {
        // Loop through and remove duplicates
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-4
    title: Two Sum
    description: >-
      What it is: Given nums and target, return indices i, j such that nums[i] + nums[j] === target
      (exactly one solution).


      Goal: Start with brute force O(n²), then optionally improve with a hash map O(n).


      What to do: Implement twoSum(nums, target). Do not reuse the same index twice.


      Finish when: Correct on a small example; you can explain your approach and why it’s correct.
    starterCode: |-
      function twoSum(nums, target) {
        // Find two indices whose values add up to target
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-5
    title: FizzBuzz
    description: >-
      What it is: Build the classic FizzBuzz sequence from 1 to n as an array of strings.


      Goal: Practice modulo rules and ordering (3 & 5 before 3 or 5 alone).


      What to do: Implement fizzBuzz(n). Multiples of 3 → "Fizz", 5 → "Buzz", both → "FizzBuzz",
      else string of the number.


      Finish when: n=15 produces the right pattern; handles n=0 or invalid n if you define behavior.
    starterCode: |-
      function fizzBuzz(n) {
        // Return array of FizzBuzz results from 1 to n
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-s1
    title: 'Static review: null and shape'
    description: >-
      What it is: Code review only—do not rely on running it.


      Goal: Spot crashes and bad assumptions when user or profile data is missing or the wrong
      shape.


      What to do: List every failure (null name, missing email, non-string). Propose guards,
      optional chaining, or validation/schema.


      Finish when: You’ve named concrete bugs and sketched a safer implementation or types in the
      editor.
    starterCode: |-
      function formatUserLabel(user) {
        return user.name.trim().toUpperCase() + " <" + user.email.toLowerCase() + ">";
      }
    language: javascript
    difficulty: junior
    staticReview: true
  - id: ct-gen-s2
    title: 'Static review: async mistake'
    description: >-
      What it is: Review async fetch usage—no execution required.


      Goal: See that fetch returns Promises and must be awaited (or chained) before .json().


      What to do: Explain what breaks today and show the corrected async/await or Promise.all
      pattern for parallel loads.


      Finish when: Clear fix is written or narrated; discuss error handling for failed HTTP.
    starterCode: |-
      async function loadProfile(userId) {
        const user = fetch("/api/users/" + userId);
        const orders = fetch("/api/orders?user=" + userId);
        return { user: await user.json(), orders: await orders.json() };
      }
    language: javascript
    difficulty: mid
    staticReview: true
  - id: ct-gen-s3
    title: 'Static review: SQL injection'
    description: >-
      What it is: Security review of a SQL string built with user input.


      Goal: Explain how concatenation enables injection and how parameterised queries / ORM bindings
      prevent it.


      What to do: Rewrite the query using placeholders (e.g. ? or $1) and show how the app passes
      userId safely.


      Finish when: Attack example + safe rewrite + one sentence on least privilege / validation.
    starterCode: |-
      -- userId from request — app builds this string with concatenation (unsafe)
      SELECT * FROM orders WHERE user_id = '<USER_INPUT>' AND status = 'open';
    language: sql
    difficulty: mid
    staticReview: true
  - id: ct-gen-s4
    title: 'Static review: time and money'
    description: >-
      What it is: Review numeric code for money and display bugs.


      Goal: Floating-point binary errors, wrong rounding, and weak formatting for currency.


      What to do: Call out issues in lineTotal/formatInvoice. Propose integer minor units (cents) or
      a decimal library; correct rounding and locale.


      Finish when: Clear list of bugs + recommended production approach.
    starterCode: |-
      function lineTotal(quantity, unitPrice) {
        return quantity * unitPrice;
      }

      function formatInvoice(total) {
        return total.toFixed(1) + " USD";
      }
    language: javascript
    difficulty: mid
    staticReview: true
  - id: ct-gen-s5
    title: 'Static review: concurrency hazard'
    description: >-
      What it is: Review read-modify-write across async DB calls under concurrency.


      Goal: Recognize lost updates when two requests decrement stock simultaneously.


      What to do: Describe the race; propose SQL UPDATE ... WHERE stock >= 1, transaction + row
      lock, or atomic decrement.


      Finish when: Correct narrative and at least one concrete fix pattern.
    starterCode: |-
      async function decrementStock(productId) {
        const row = await db.get("SELECT stock FROM products WHERE id = ?", productId);
        const next = row.stock - 1;
        await db.run("UPDATE products SET stock = ? WHERE id = ?", next, productId);
      }
    language: javascript
    difficulty: senior
    staticReview: true
  - id: ct-gen-s6
    title: 'Static review: Python types'
    description: |-
      What it is: Static analysis of a tiny Python helper—no need to run mypy.

      Goal: Empty list, wrong element type, missing keys, None name.

      What to do: List runtime errors; suggest typing (list[dict], TypedDict), guards, and tests.

      Finish when: Revised signature or defensive code sketched.
    starterCode: |
      def first_label(items):
          return items[0]["name"].strip().lower()
    language: python
    difficulty: mid
    staticReview: true
  - id: ct-gen-s7
    title: 'Static review: regex cost'
    description: >-
      What it is: Review building a RegExp from untrusted user input.


      Goal: ReDoS (catastrophic backtracking) and validation bypass risks.


      What to do: Explain dangers; prefer allow-lists, anchored patterns, or a parser; never
      concatenate raw user regex without review.


      Finish when: Threat + safer validation strategy stated.
    starterCode: |
      const emailPattern = new RegExp("^(" + userSuppliedPattern + ")+$");
    language: javascript
    difficulty: senior
    staticReview: true
  - id: ct-gen-s8
    title: 'Static review: API pagination'
    description: >-
      What it is: Review an HTTP handler that builds SQL from query params.


      Goal: Injection via page, NaN offsets, unbounded scans, missing limits.


      What to do: List issues; propose validated integer page/size, parameterised LIMIT/OFFSET or
      cursor API, and caps.


      Finish when: Security + correctness fixes outlined.
    starterCode: |-
      app.get("/items", (req, res) => {
        const page = parseInt(req.query.page, 10) || 0;
        const sql = "SELECT * FROM items LIMIT 20 OFFSET " + page * 20;
        db.all(sql, (err, rows) => res.json(rows));
      });
    language: javascript
    difficulty: senior
    staticReview: true
