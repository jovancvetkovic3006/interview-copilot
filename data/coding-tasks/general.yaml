role: General
tasks:
  - id: ct-gen-1
    title: Find the Maximum in an Array
    description: >-
      What it is: A small array-scanning exercise (classic warm-up).


      Goal: Return the largest number in an array by looping and comparing—no Math.max, no sort.


      What to do: Implement findMax(numbers). Decide and document behavior for an empty array
      (return undefined, throw, or null). Handle negatives and ties.


      Finish when: You can walk through examples (e.g. [3,1,4], [-2,-9], single element) and the
      logic is clear in the shared editor.
    starterCode: |-
      function findMax(numbers) {
        // Loop through the array and find the maximum value
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-2
    title: Reverse an Array In-Place
    description: >-
      What it is: Mutate the given array so its elements appear in reverse order without allocating
      a second array.


      Goal: Practice indices and swapping from both ends toward the middle.


      What to do: Implement reverseArray(arr). Use a loop and swap arr[i] with arr[j]. Do not use
      reverse() or a copy-then-assign pattern.


      Finish when: Odd/even lengths both work; you can explain O(n) time and O(1) extra space.
    starterCode: |-
      function reverseArray(arr) {
        // Reverse the array in-place using a loop
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-3
    title: Remove Duplicates from an Array
    description: >-
      What it is: Produce a new array with first occurrence of each value only, in original order.


      Goal: Duplicate removal without Set (use a plain loop / object map if you like).


      What to do: Implement removeDuplicates(arr). Preserve order: [1,2,1,3] → [1,2,3].


      Finish when: Works for strings and numbers; mention complexity; edge cases: empty array, all
      duplicates.
    starterCode: |-
      function removeDuplicates(arr) {
        // Loop through and remove duplicates
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-4
    title: Two Sum
    description: >-
      What it is: Given nums and target, return indices i, j such that nums[i] + nums[j] === target
      (exactly one solution).


      Goal: Start with brute force O(n²), then optionally improve with a hash map O(n).


      What to do: Implement twoSum(nums, target). Do not reuse the same index twice.


      Finish when: Correct on a small example; you can explain your approach and why it’s correct.
    starterCode: |-
      function twoSum(nums, target) {
        // Find two indices whose values add up to target
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-5
    title: FizzBuzz
    description: >-
      What it is: Build the classic FizzBuzz sequence from 1 to n as an array of strings.


      Goal: Practice modulo rules and ordering (3 & 5 before 3 or 5 alone).


      What to do: Implement fizzBuzz(n). Multiples of 3 → "Fizz", 5 → "Buzz", both → "FizzBuzz",
      else string of the number.


      Finish when: n=15 produces the right pattern; handles n=0 or invalid n if you define behavior.
    starterCode: |-
      function fizzBuzz(n) {
        // Return array of FizzBuzz results from 1 to n
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-6
    title: First Non-Repeating Character
    description: >-
      What it is: Classic string scan—find the first character that appears exactly once (order
      matters).


      Goal: Count or track occurrences; return the first letter in left-to-right order that has
      count 1. str contains only letters and spaces; ignore spaces or treat them as you document.


      What to do: Implement nonRepeatingCharacter(str). Example: "agettkgaeee" → "k". The string
      always has at least one character and at least one non-repeating character (per problem
      guarantee).


      Finish when: Walk through the example; state time/space; mention what you’d do without the
      guarantee.
    starterCode: |-
      function nonRepeatingCharacter(str) {
        // Return the first character that appears exactly once in str
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-7
    title: Pairs That Sum to First Element
    description: >-
      What it is: Array “two sum” variant—the target is always arr[0]; pairs use elements from
      index 1 onward only (exclude the first element from being a summand).


      Goal: Find all unordered pairs (i,j) with i<j, both ≥1, such that arr[i]+arr[j] === arr[0].
      Output format matters for auto-checkers: pairs as "a,b" comma inside pair, pairs separated
      by a single space, in order of the first number’s appearance in arr. If none, return "-1".


      What to do: Implement twoSumToFirst(arr). Example: [7, 3, 5, 2, -4, 8, 11] → "5,2 -4,11".


      Finish when: Empty pair list returns "-1"; duplicates in output avoided; explain O(n²) vs
      hash approach.
    starterCode: |-
      function twoSumToFirst(arr) {
        // Return "a,b c,d ..." for all pairs summing to arr[0], or "-1" if none
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-8
    title: Palindrome Check
    description: >-
      What it is: Decide if a string reads the same forwards and backwards, ignoring case and
      non-alphanumeric characters (classic interview normalization).


      Goal: Two pointers from ends, skip junk, compare letters.


      What to do: Implement isPalindrome(str). Document whether spaces/punctuation are ignored.


      Finish when: "A man, a plan, a canal: Panama" style cases; empty string edge case.
    starterCode: |-
      function isPalindrome(str) {
        // Return true if str is a palindrome under your stated rules
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-9
    title: Anagram Check
    description: >-
      What it is: Two strings are anagrams if the same multiset of letters (ignoring case/spaces as
      you define).


      What to do: Implement isAnagram(a, b). Prefer O(n) character counts over sorting if you can.


      Finish when: Different lengths; Unicode vs ASCII—state your assumption.
    starterCode: |-
      function isAnagram(a, b) {
        // Return true if a and b are anagrams of each other
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-10
    title: First Recurring Character
    description: >-
      What it is: Return the first character that appears twice as you scan left to right (or null /
      empty if none).


      Goal: Set or object map for O(n) membership.


      What to do: Implement firstRecurringChar(str).


      Finish when: "abcdefa" → "a"; "abcdef" → null (or your sentinel).
    starterCode: |-
      function firstRecurringChar(str) {
        // Return first char that repeats, or null if every char is unique in order
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-11
    title: Valid Parentheses
    description: >-
      What it is: Classic stack problem—only (), [], {} and determine if every opener is closed in
      the right order.


      What to do: Implement isValidParentheses(s). Empty string is usually valid.


      Finish when: "([)]" is invalid; "{[]}" is valid; mention complexity.
    starterCode: |-
      function isValidParentheses(s) {
        // Return true if all brackets are balanced and correctly nested
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-12
    title: Maximum Subarray Sum (Kadane)
    description: >-
      What it is: Given an integer array (may include negatives), find the contiguous subarray with
      the largest sum and return that sum.


      Goal: Kadane’s idea—carry a running best ending here; reset when sum goes negative (or define
      behavior for all-negative arrays).


      What to do: Implement maxSubArray(nums).


      Finish when: [-2,1,-3,4,-1,2,1,-5,4] → 6; discuss empty array if you allow it.
    starterCode: |-
      function maxSubArray(nums) {
        // Return the largest sum of any contiguous subarray
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-13
    title: Reverse Words in a String
    description: >-
      What it is: Trim extra spaces and reverse the order of words (not the letters inside each
      word).


      What to do: Implement reverseWords(s). Example: "  hello   world  " → "world hello".


      Finish when: Multiple spaces collapsed; leading/trailing spaces removed.
    starterCode: |-
      function reverseWords(s) {
        // Return words in reverse order, single spaces between, no leading/trailing space
      }
    language: javascript
    difficulty: junior
  - id: ct-gen-14
    title: Move Zeros to End
    description: >-
      What it is: Rearrange the array in-place so all zeros come after non-zeros, preserving the
      relative order of non-zeros.


      Goal: Two-pointer or “write position” pattern; O(n) time, O(1) extra space.


      What to do: Implement moveZeros(nums).


      Finish when: [0,1,0,3,12] → [1,3,12,0,0]; all zeros / no zeros edge cases.
    starterCode: |-
      function moveZeros(nums) {
        // Mutate nums so non-zeros keep order and zeros are at the end; return nothing or nums
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-15
    title: Longest Substring Without Repeating Characters
    description: >-
      What it is: LeetCode-classic sliding window—length of the longest substring with all distinct
      characters.


      Goal: Expand right, shrink left when a duplicate appears inside the window (map last index).


      What to do: Implement lengthOfLongestSubstring(s).


      Finish when: "abcabcbb" → 3; O(n) argument; empty string.
    starterCode: |-
      function lengthOfLongestSubstring(s) {
        // Return length of longest substring with no repeated character
      }
    language: javascript
    difficulty: senior
  - id: ct-gen-16
    title: Merge Two Sorted Arrays
    description: >-
      What it is: Given two sorted arrays, produce one sorted array containing all elements (classic
      merge step from mergesort).


      Goal: Two pointers; avoid unnecessary full sorts of the combined data.


      What to do: Implement mergeSorted(a, b). Return a new array (do not assume in-place merge into
      fixed buffers unless specified).


      Finish when: One array empty; duplicates allowed; state complexity.
    starterCode: |-
      function mergeSorted(a, b) {
        // Return a new sorted array containing all elements of a and b in order
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-17
    title: Binary Search
    description: >-
      What it is: Sorted array of distinct integers and a target—return the index of target, or -1
      if absent.


      Goal: Halve the search space each step; watch off-by-one and integer mid overflow (optional
      discussion).


      What to do: Implement binarySearch(nums, target).


      Finish when: Empty array; single element; target at ends.
    starterCode: |-
      function binarySearch(nums, target) {
        // Return index of target in sorted nums, or -1 if not found
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-18
    title: Roman to Integer
    description: >-
      What it is: Convert a valid Roman numeral string (I, V, X, L, C, D, M) to its integer value
      using subtraction rules (IV, IX, etc.).


      What to do: Implement romanToInt(s). Assume input is valid or document validation.


      Finish when: "MCMXCIV" → 1994; left-to-right scan with “peek next” rule.
    starterCode: |-
      function romanToInt(s) {
        // Convert Roman numeral string to integer
      }
    language: javascript
    difficulty: senior
  - id: ct-gen-19
    title: Word Pattern
    description: >-
      What it is: Pattern-matching over letters vs words—each distinct letter in pattern must map to
      exactly one word, and each distinct word must map to exactly one letter (bijection in order).
      Same letter → same word every time; different letters → different words.


      Goal: Split str on spaces and walk pattern and words in lockstep; detect conflicts with two
      maps or one map + inverse check.


      What to do: Implement wordPattern(pattern, str). Example: pattern "abcb" with str
      "cat dog fish dog" → true (a→cat, b→dog, c→fish, b→dog again). "abcb" with "cat cat fish dog"
      → false (a and b cannot both map to "cat").


      Finish when: Length mismatch (pattern length vs word count) → false; empty pattern/str edge
      cases; state O(n) time and space.
    starterCode: |-
      function wordPattern(pattern, str) {
        // Return true if str's space-separated words follow the letter pattern bijectively
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-20
    title: Find Intersection of Two Sorted Lists
    description: >-
      What it is: A classic two-pointer / set problem. Input is an array strArr with exactly two
      elements: each element is a comma-separated list of numbers already sorted in ascending
      order (as a string). Output is a single comma-separated string containing the numbers that
      appear in both lists, in ascending order. If there is no intersection, return the literal
      string "false".


      Goal: Practice parsing input, walking two sorted sequences in parallel, and joining the
      result back into the same string format. Naive O(n*m) nested-loop is fine to discuss first,
      then improve to O(n + m) with two pointers (since both inputs are already sorted).


      What to do: Implement findIntersection(strArr). Split each element on ", " (handle stray
      whitespace), convert to numbers, find common values, then join with ", ". Examples:
      strArr = ["1, 3, 4, 7, 13", "1, 2, 4, 13, 15"] → "1, 4, 13".
      strArr = ["1, 2, 3", "4, 5, 6"] → "false".


      Finish when: Two-pointer version handles duplicates sanely (no double-emit), the empty-
      intersection case returns the string "false" (not the boolean), and the output uses the
      same ", " separator as the input.
    starterCode: |-
      function findIntersection(strArr) {
        // strArr has exactly 2 elements, each a comma-separated, ascending-sorted list of numbers.
        // Return the intersection as a comma-separated string, or the string "false" if empty.
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-21
    title: Next Palindrome Number
    description: >-
      What it is: Given a positive integer num, return the next strictly larger integer that is a
      palindrome (reads the same forward and backward). Examples: 24 → 33, 8 → 9, 9 → 11,
      99 → 101, 808 → 818, 999 → 1001.


      Goal: Start with the obvious brute force (n = num + 1; while n is not a palindrome, n++)
      to get something working, then discuss an O(number-of-digits) approach that mirrors the
      left half onto the right half and handles the "carry / rollover" case (e.g. 999 → 1001).


      What to do: Implement nextPalindrome(num). isPalindrome can be a string-reverse compare
      or a two-pointer scan. Decide explicitly what "next" means when num itself is already a
      palindrome — should you skip it? (Yes, the prompt says "next largest", so 11 → 22, not 11.)


      Finish when: Brute force passes the examples above; you can sketch (or implement) the
      mirror-and-carry version for big inputs (e.g. 1234567); single-digit and all-9s edges are
      handled.
    starterCode: |-
      function nextPalindrome(num) {
        // Return the next integer strictly greater than num that reads the same forward and backward.
      }
    language: javascript
    difficulty: mid
  - id: ct-gen-s1
    title: 'Static review: null and shape'
    description: >-
      What it is: Code review only—do not rely on running it.


      Goal: Spot crashes and bad assumptions when user or profile data is missing or the wrong
      shape.


      What to do: List every failure (null name, missing email, non-string). Propose guards,
      optional chaining, or validation/schema.


      Finish when: You’ve named concrete bugs and sketched a safer implementation or types in the
      editor.
    starterCode: |-
      function formatUserLabel(user) {
        return user.name.trim().toUpperCase() + " <" + user.email.toLowerCase() + ">";
      }
    language: javascript
    difficulty: junior
    staticReview: true
  - id: ct-gen-s2
    title: 'Static review: async mistake'
    description: >-
      What it is: Review async fetch usage—no execution required.


      Goal: See that fetch returns Promises and must be awaited (or chained) before .json().


      What to do: Explain what breaks today and show the corrected async/await or Promise.all
      pattern for parallel loads.


      Finish when: Clear fix is written or narrated; discuss error handling for failed HTTP.
    starterCode: |-
      async function loadProfile(userId) {
        const user = fetch("/api/users/" + userId);
        const orders = fetch("/api/orders?user=" + userId);
        return { user: await user.json(), orders: await orders.json() };
      }
    language: javascript
    difficulty: mid
    staticReview: true
  - id: ct-gen-s3
    title: 'Static review: SQL injection'
    description: >-
      What it is: Security review of a SQL string built with user input.


      Goal: Explain how concatenation enables injection and how parameterised queries / ORM bindings
      prevent it.


      What to do: Rewrite the query using placeholders (e.g. ? or $1) and show how the app passes
      userId safely.


      Finish when: Attack example + safe rewrite + one sentence on least privilege / validation.
    starterCode: |-
      -- userId from request — app builds this string with concatenation (unsafe)
      SELECT * FROM orders WHERE user_id = '<USER_INPUT>' AND status = 'open';
    language: sql
    difficulty: mid
    staticReview: true
  - id: ct-gen-s4
    title: 'Static review: time and money'
    description: >-
      What it is: Review numeric code for money and display bugs.


      Goal: Floating-point binary errors, wrong rounding, and weak formatting for currency.


      What to do: Call out issues in lineTotal/formatInvoice. Propose integer minor units (cents) or
      a decimal library; correct rounding and locale.


      Finish when: Clear list of bugs + recommended production approach.
    starterCode: |-
      function lineTotal(quantity, unitPrice) {
        return quantity * unitPrice;
      }

      function formatInvoice(total) {
        return total.toFixed(1) + " USD";
      }
    language: javascript
    difficulty: mid
    staticReview: true
  - id: ct-gen-s5
    title: 'Static review: concurrency hazard'
    description: >-
      What it is: Review read-modify-write across async DB calls under concurrency.


      Goal: Recognize lost updates when two requests decrement stock simultaneously.


      What to do: Describe the race; propose SQL UPDATE ... WHERE stock >= 1, transaction + row
      lock, or atomic decrement.


      Finish when: Correct narrative and at least one concrete fix pattern.
    starterCode: |-
      async function decrementStock(productId) {
        const row = await db.get("SELECT stock FROM products WHERE id = ?", productId);
        const next = row.stock - 1;
        await db.run("UPDATE products SET stock = ? WHERE id = ?", next, productId);
      }
    language: javascript
    difficulty: senior
    staticReview: true
  - id: ct-gen-s6
    title: 'Static review: Python types'
    description: |-
      What it is: Static analysis of a tiny Python helper—no need to run mypy.

      Goal: Empty list, wrong element type, missing keys, None name.

      What to do: List runtime errors; suggest typing (list[dict], TypedDict), guards, and tests.

      Finish when: Revised signature or defensive code sketched.
    starterCode: |
      def first_label(items):
          return items[0]["name"].strip().lower()
    language: python
    difficulty: mid
    staticReview: true
  - id: ct-gen-s7
    title: 'Static review: regex cost'
    description: >-
      What it is: Review building a RegExp from untrusted user input.


      Goal: ReDoS (catastrophic backtracking) and validation bypass risks.


      What to do: Explain dangers; prefer allow-lists, anchored patterns, or a parser; never
      concatenate raw user regex without review.


      Finish when: Threat + safer validation strategy stated.
    starterCode: |
      const emailPattern = new RegExp("^(" + userSuppliedPattern + ")+$");
    language: javascript
    difficulty: senior
    staticReview: true
  - id: ct-gen-s8
    title: 'Static review: API pagination'
    description: >-
      What it is: Review an HTTP handler that builds SQL from query params.


      Goal: Injection via page, NaN offsets, unbounded scans, missing limits.


      What to do: List issues; propose validated integer page/size, parameterised LIMIT/OFFSET or
      cursor API, and caps.


      Finish when: Security + correctness fixes outlined.
    starterCode: |-
      app.get("/items", (req, res) => {
        const page = parseInt(req.query.page, 10) || 0;
        const sql = "SELECT * FROM items LIMIT 20 OFFSET " + page * 20;
        db.all(sql, (err, rows) => res.json(rows));
      });
    language: javascript
    difficulty: senior
    staticReview: true
